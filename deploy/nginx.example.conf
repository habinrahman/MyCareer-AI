# Legacy static example (host-installed Nginx).
# Production Docker deployments use the image in deploy/docker/nginx/ — see deploy/DEPLOYMENT.md.
# Replace server_name and upstream hosts with your domains / Docker bridge IPs.

upstream mycareer_web {
    server 127.0.0.1:3000;
}

upstream mycareer_api {
    server 127.0.0.1:8000;
}

server {
    listen 443 ssl http2;
    server_name app.example.com;

    # ssl_certificate /etc/letsencrypt/live/app.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

    location / {
        proxy_pass http://mycareer_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    client_max_body_size 12m;

    location / {
        proxy_pass http://mycareer_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
